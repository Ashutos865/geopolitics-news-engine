name: Global News Update

on:
  schedule:
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp feedparser pandas trafilatura

      - name: Run Scraper
        # This command finds scraper.py wherever it is and runs it
        run: |
          SCRAPER_PATH=$(find . -name "scraper.py" -print -quit)
          if [ -z "$SCRAPER_PATH" ]; then
            echo "Error: scraper.py not found"
            exit 1
          fi
          python "$SCRAPER_PATH"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          
          git pull origin main --rebase 
          
          # Automatically find and add the data files
          find . -name "seen_links.json" -exec git add {} +
          find . -name "raw_news.json" -exec git add {} +
          
          git commit -m "Auto-update: Tactical Intelligence Sync [$(date)]" || exit 0
          git push origin main