name: Global News Update

on:
  schedule:
    # Runs every 5 minutes at specific offsets
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential for rebase to work

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp feedparser pandas trafilatura

      - name: Run Scraper
        run: |
          SCRAPER_PATH=$(find . -name "scraper.py" -print -quit)
          if [ -z "$SCRAPER_PATH" ]; then
            echo "Error: scraper.py not found"
            exit 1
          fi
          python "$SCRAPER_PATH"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          
          # 1. Pull the latest data and prioritize LOCAL changes for JSON files
          git pull origin main --rebase -X theirs
          
          # 2. Add files
          find . -name "seen_links.json" -exec git add {} +
          find . -name "raw_news.json" -exec git add {} +
          
          # 3. Check if there are actual changes before committing
          if git diff --staged --quiet; then
            echo "No new intelligence data found. Skipping commit."
          else
            git commit -m "Tactical Intelligence Sync [$(date)]"
            
            # 4. Use a retry loop for the push in case of a race condition
            for i in {1..3}; do
              git push origin main && break || (git pull origin main --rebase -X theirs && sleep 5)
            done
          fi