name: Global News Update

on:
  schedule:
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp feedparser pandas trafilatura

      - name: Run Scraper
        # Changed: Must enter the RSS folder to find scraper.py
        run: |
          cd RSS
          python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          
          git pull origin main --rebase 
          
          # Changed: Adding files with their correct folder path
          git add RSS/seen_links.json RSS/raw_news.json
          
          git commit -m "Auto-update: Tactical Intelligence Sync [$(date)]" || exit 0
          
          git push origin main