name: Global News Update

on:
  schedule:
    # Runs every 12 minutes (Professional interval to prevent push collisions)
    - cron: '*/12 * * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install aiohttp feedparser pandas trafilatura

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          
          # 1. Temporarily hide the new data changes
          git stash
          
          # 2. Get the latest code from the repo
          git pull origin main --rebase
          
          # 3. Bring your new news data back
          git stash pop || echo "No changes to pop"
          
          # 4. Stage and push
          git add seen_links.json raw_news.json
          
          if git diff --staged --quiet; then
            echo "No new intelligence data."
          else
            git commit -m "Intelligence Sync: $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          fi
        - name: Install Dependencies
        run: |
          pip install aiohttp feedparser pandas trafilatura google-generativeai