name: Global News Update

on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 minutes
  workflow_dispatch:      # Adds a "Run" button for manual testing

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Gives the bot permission to push news back to your repo
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install aiohttp feedparser pandas trafilatura

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add seen_links.json raw_news.json
          git commit -m "Auto-update: Extracted full article content" || exit 0
          git push