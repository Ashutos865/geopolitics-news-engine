name: Global News Update

on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 minutes
  workflow_dispatch:      # Adds a "Run" button for manual testing

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential so the bot can merge changes

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install aiohttp feedparser pandas trafilatura

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          
          # 1. Pull latest changes and REBASE to avoid merge commits
          git pull origin main --rebase
          
          # 2. Add only the data files
          git add seen_links.json raw_news.json
          
          # 3. Only commit if there are actual changes
          git diff --staged --quiet || (git commit -m "Auto-update: Intelligence Sync" && git push origin main)